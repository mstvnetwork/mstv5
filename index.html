<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MSNET IPTV Cinema Mode</title>

<style>
:root {
    --bg-muddy: #1a1a1a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-muddy); color: #fff; overflow: hidden; }

.main-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
    text-align: center;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
}

.player-wrapper {
    position: relative;
    width: 100%;
    max-width: 1280px;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 8px;
    border: 1px solid #333;
    overflow: hidden;
    box-shadow: 0 0 50px rgba(0,0,0,0.8);
    margin-bottom: 30px;
}

#videoPlayer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}

/* Invisible overlay to block clicks after 40s */
#silentLockOverlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none; /* default: allow interaction */
    z-index: 9999;
}
</style>
</head>
<body>

<div id="browser-error" style="display:none;">
    <h2>Chrome Required</h2>
    <p>This Cinema experience is only available on <strong>Google Chrome</strong>.</p>
</div>

<div id="chrome-only-content" class="main-content" style="display:none;">
    <h2 id="currentTitle">Cinema Mode Initializing...</h2>
    
    <div class="player-wrapper">
        <iframe id="videoPlayer" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" playsinline></iframe>
        <div id="silentLockOverlay"></div>
    </div>
</div>
<script>
const GITHUB_JSON_URL = "https://raw.githubusercontent.com/mstvnetwork/mstv4/refs/heads/main/epg.json?v=" + Date.now();
const playlist = [
    { title: "Indian Idol", url: "https://vkprime.com/embed-k1ipwza01c0d.html" },
    { title: "Mtv", url: "https://vkprime.com/embed-e6r4icq8gcq1.html" }
];

let silentLockTimer;
const lockOverlay = document.getElementById('silentLockOverlay');

function isStrictChrome() {
    const ua = navigator.userAgent;
    const isChrome = (ua.indexOf("Chrome") > -1 || ua.indexOf("CriOS") > -1);
    const isOther = (ua.indexOf("Edg") > -1 || ua.indexOf("SamsungBrowser") > -1 || ua.indexOf("OPR") > -1);
    return isChrome && !isOther;
}

async function loadEPG() {
    try {
        const res = await fetch(GITHUB_JSON_URL, { cache: "no-store" });
        const data = await res.json();
        const now = new Date();
        let currentProgramTitle = null;

        for (let i = 0; i < data.schedule.length; i++) {
            const start = new Date(data.schedule[i].start);
            const end = new Date(data.schedule[i].end);
            if (now >= start && now < end) {
                currentProgramTitle = data.schedule[i].title;
                break;
            }
        }

        // If no EPG match, rotate to next in playlist based on current iframe src
        if(!currentProgramTitle) {
            const player = document.getElementById('videoPlayer');
            const currentIndex = playlist.findIndex(v => v.url === player.src);
            const nextIndex = (currentIndex + 1) % playlist.length;
            currentProgramTitle = playlist[nextIndex].title;
        }

        syncVideo(currentProgramTitle);

    } catch(e) {
        console.error("EPG Error:", e);
        // Fallback rotation on error
        const player = document.getElementById('videoPlayer');
        const currentIndex = playlist.findIndex(v => v.url === player.src);
        const nextIndex = (currentIndex + 1) % playlist.length;
        syncVideo(playlist[nextIndex].title);
    }
}

function syncVideo(liveTitle){
    const player = document.getElementById('videoPlayer');
    const currentTitleEl = document.getElementById('currentTitle');
    let liveVideo = playlist.find(v => v.title === liveTitle);

    // If we have a video to play AND it's different from what's currently playing
    if(liveVideo && player.src !== liveVideo.url){
        
        // 1. Update UI and Player
        player.src = liveVideo.url;
        currentTitleEl.innerText = "Playing: " + liveVideo.title;

        // 2. UNLOCK: Allow clicks immediately when URL rotates
        clearTimeout(silentLockTimer);
        lockOverlay.style.pointerEvents = 'none'; 
        console.log("URL Rotated: Interaction Enabled for 40s");

        // 3. SET TIMER: Lock after 40 seconds
        silentLockTimer = setTimeout(()=>{
            lockOverlay.style.pointerEvents = 'auto';
            console.log("40s reached: Interaction Locked");
        }, 40000); 
    }
}

window.onload = function(){
    if(isStrictChrome()){
        document.getElementById('chrome-only-content').style.display='block';
        loadEPG();
        // Check for rotation/updates every 60 seconds
        setInterval(loadEPG, 60000); 
    } else {
        document.getElementById('browser-error').style.display='block';
    }
};
</script>

</body>
</html>
