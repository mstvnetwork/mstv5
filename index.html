<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MSNET IPTV Cinema Mode - Locked</title>

<style>
:root {
    --bg-muddy: #1a1a1a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-muddy); color: #fff; overflow: hidden; }

.main-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
    text-align: center;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
}

.player-wrapper {
    position: relative;
    width: 100%;
    max-width: 1280px;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 8px;
    border: 1px solid #333;
    overflow: hidden;
    box-shadow: 0 0 50px rgba(0,0,0,0.8);
    margin-bottom: 30px;
}

#videoPlayer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}

/* 
   The critical fix: 
   z-index must be higher than the iframe. 
   pointer-events: none allows clicks to pass through.
   pointer-events: auto blocks all clicks.
*/
#silentLockOverlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 9999; 
    pointer-events: none; 
    background: rgba(0, 0, 0, 0); /* invisible */
    transition: background 0.3s ease;
}
</style>
</head>
<body>

<div id="browser-error" style="display:none; padding: 50px; text-align: center;">
    <h2>Chrome Required</h2>
    <p>This Cinema experience is only available on <strong>Google Chrome</strong>.</p>
</div>

<div id="chrome-only-content" class="main-content" style="display:none;">
    <h2 id="currentTitle" style="margin-bottom: 15px;">Cinema Mode Initializing...</h2>
    
    <div class="player-wrapper">
        <iframe id="videoPlayer" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" playsinline></iframe>
        <!-- This div sits ON TOP of the video -->
        <div id="silentLockOverlay"></div>
    </div>
    <p id="lockStatus" style="font-size: 0.8em; color: #666;">Interaction: Enabled</p>
</div>

<script>
const GITHUB_JSON_URL = "https://raw.githubusercontent.com" + Date.now();
const playlist = [
    { title: "Indian Idol", url: "https://vkprime.com" },
    { title: "Mtv", url: "https://vkprime.com" }
];

let silentLockTimer;
const lockOverlay = document.getElementById('silentLockOverlay');
const lockStatusText = document.getElementById('lockStatus');

function isStrictChrome() {
    const ua = navigator.userAgent;
    const isChrome = (ua.indexOf("Chrome") > -1 || ua.indexOf("CriOS") > -1);
    const isOther = (ua.indexOf("Edg") > -1 || ua.indexOf("SamsungBrowser") > -1 || ua.indexOf("OPR") > -1);
    return isChrome && !isOther;
}

async function loadEPG() {
    console.log("Checking EPG/Rotation...");
    try {
        const res = await fetch(GITHUB_JSON_URL, { cache: "no-store" });
        const data = await res.json();
        const now = new Date();
        let currentProgramTitle = null;

        for (let i = 0; i < data.schedule.length; i++) {
            const start = new Date(data.schedule[i].start);
            const end = new Date(data.schedule[i].end);
            if (now >= start && now < end) {
                currentProgramTitle = data.schedule[i].title;
                break;
            }
        }

        if(!currentProgramTitle) {
            const player = document.getElementById('videoPlayer');
            const currentIndex = playlist.findIndex(v => v.url === player.src);
            const nextIndex = (currentIndex + 1) % playlist.length;
            currentProgramTitle = playlist[nextIndex].title;
        }

        syncVideo(currentProgramTitle);

    } catch(e) {
        console.error("EPG Error:", e);
        const player = document.getElementById('videoPlayer');
        const currentIndex = playlist.findIndex(v => v.url === player.src);
        const nextIndex = (currentIndex + 1) % playlist.length;
        syncVideo(playlist[nextIndex].title);
    }
}

function syncVideo(liveTitle){
    const player = document.getElementById('videoPlayer');
    const currentTitleEl = document.getElementById('currentTitle');
    let liveVideo = playlist.find(v => v.title === liveTitle);

    // Trigger update if URL is different
    if(liveVideo && player.src !== liveVideo.url){
        console.log("New Video Detected. Updating player...");
        
        player.src = liveVideo.url;
        currentTitleEl.innerText = "Playing: " + liveVideo.title;

        // 1. UNLOCK: Reset overlay so user can click Play/Pause
        clearTimeout(silentLockTimer);
        lockOverlay.style.pointerEvents = 'none'; 
        lockOverlay.style.background = 'rgba(0,0,0,0)';
        lockStatusText.innerText = "Interaction: Enabled (Reset)";
        lockStatusText.style.color = "#4CAF50";

        // 2. START LOCK TIMER: Disable interaction after 40 seconds
        silentLockTimer = setTimeout(() => {
            lockOverlay.style.pointerEvents = 'auto'; // This blocks the iframe
            lockStatusText.innerText = "Interaction: LOCKED";
            lockStatusText.style.color = "#FF5252";
            console.log("40 Seconds reached. Screen Locked.");
        }, 40000); 
    }
}

window.onload = function(){
    if(isStrictChrome()){
        document.getElementById('chrome-only-content').style.display='block';
        loadEPG();
        // Check for title/URL changes every 60 seconds
        setInterval(loadEPG, 60000); 
    } else {
        document.getElementById('browser-error').style.display='block';
    }
};
</script>
</body>
</html>
