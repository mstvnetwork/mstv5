<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV Channel</title>

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        /* Basic styling for full screen video */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Ensure body takes full viewport height */
        }
        #my-video {
            width: 100vw;
            height: 100vh;
            /* Ensure video scales without distortion, covering the area */
            object-fit: contain;
            background-color: black; /* To fill empty space if object-fit is 'contain' */
        }
        #loading-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.5em;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 8px;
            z-index: 10;
            display: none; /* Hidden by default */
        }
    </style>
</head>
<body>
    <video
        id="my-video"
        class="video-js vjs-default-skin"
        controls
        preload="auto"
        autoplay
        playsinline
        data-setup='{}'
    >
        Your browser does not support the video tag.
    </video>

    <div id="loading-message">Loading channel data...</div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.0/dist/hls.min.js"></script>

    <script>
        const player = videojs('my-video');
        let currentVideoIndex = 0;
        let playlist = []; // This will be populated from the JSON file
        const loadingMessage = document.getElementById('loading-message');

        // --- Helper to show/hide loading message ---
        function showLoading() {
            loadingMessage.style.display = 'block';
        }

        function hideLoading() {
            loadingMessage.style.display = 'none';
        }

        // --- Fetch Playlist from JSON ---
        async function fetchPlaylist() {
            showLoading();
            try {
                // Adjust the path if your playlist.json is in a subfolder (e.g., '/data/playlist.json')
                const response = await fetch('playlist.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                playlist = await response.json();
                console.log('Playlist loaded:', playlist);
                if (playlist.length > 0) {
                    player.ready(function() {
                        loadAndResumeChannel();
                    });
                } else {
                    console.error('Playlist is empty!');
                    hideLoading();
                }
            } catch (error) {
                console.error('Failed to load playlist:', error);
                loadingMessage.textContent = 'Failed to load channel. Please try again later.';
            } finally {
                // hideLoading(); // Hide after initial load attempt, even if failed, to show error message
            }
        }

        // --- Helper to play a video ---
        function playVideo(index, seekTime = 0) {
            hideLoading(); // Hide loading once video starts loading
            const video = playlist[index];
            if (!video) {
                console.warn('No video found at index:', index, '. Restarting playlist.');
                index = 0; // Loop back to the start if somehow out of bounds
                video = playlist[index];
                if (!video) { // If playlist is still empty after reset
                    console.error('Playlist is completely empty or malformed. Cannot play video.');
                    showLoading(); // Show error message if nothing can be played
                    loadingMessage.textContent = 'No playable content available.';
                    return;
                }
            }

            console.log(`Playing: ${video.url} from ${seekTime}s`);

            // Check if HLS is supported and if it's an M3U8 URL
            if (video.url.endsWith('.m3u8') && Hls.isSupported()) {
                if (player.hls) {
                    player.hls.destroy(); // Destroy previous HLS instance if any
                }
                const hls = new Hls();
                hls.loadSource(video.url);
                hls.attachMedia(player.tech_.el()); // Attach to the underlying video element
                player.hls = hls; // Store HLS instance on player for later cleanup if needed

                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    player.play();
                    if (seekTime > 0) {
                        player.currentTime(seekTime);
                    }
                });
                hls.on(Hls.Events.ERROR, function (event, data) {
                    console.error('HLS.js error:', data);
                    if (data.fatal) {
                        switch(data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                console.error('HLS Network error. Retrying or playing next.');
                                showLoading();
                                loadingMessage.textContent = 'Network error. Trying next video...';
                                setTimeout(() => playNextVideo(), 2000); // Try next after a short delay
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                console.error('HLS Media error. Trying to recover or playing next.');
                                hls.recoverMediaError();
                                showLoading();
                                loadingMessage.textContent = 'Media error. Attempting recovery...';
                                setTimeout(() => { // Hide message after recovery attempt
                                    if (!player.paused()) hideLoading();
                                }, 3000);
                                break;
                            default:
                                playNextVideo(); // Cannot recover, play next video
                                break;
                        }
                    }
                });
            } else {
                // For MP4 or if HLS is not supported
                player.src({
                    src: video.url,
                    type: video.url.endsWith('.mp4') ? 'video/mp4' : 'application/x-mpegURL' // Fallback type
                });
                player.load(); // Load the new source
                player.play();
                player.on('loadedmetadata', function() {
                    if (seekTime > 0) {
                        player.currentTime(seekTime);
                    }
                });
            }
            currentVideoIndex = index; // Update the current index
            saveChannelState(); // Save state after starting playback
        }

        // --- Advance to the next video in the playlist ---
        function playNextVideo() {
            let nextIndex = (currentVideoIndex + 1) % playlist.length;
            playVideo(nextIndex);
        }

        // --- Event Listener for Video End ---
        player.on('ended', function() {
            console.log('Video ended. Playing next...');
            playNextVideo();
        });

        // --- Error Handling for Video.js ---
        player.on('error', function(e) {
            console.error('Video.js error:', player.error(), e);
            console.log('Attempting to play next video due to error...');
            showLoading();
            loadingMessage.textContent = 'Video playback error. Trying next video...';
            setTimeout(() => playNextVideo(), 2000); // Add a small delay before moving on
        });

        // --- Listen for buffering ---
        player.on('waiting', function() {
            console.log('Video is buffering...');
            showLoading();
            loadingMessage.textContent = 'Buffering...';
        });

        player.on('playing', function() {
            console.log('Video is playing.');
            hideLoading();
        });


        // --- Client-Side Time Synchronization (using localStorage) ---
        // IMPORTANT: This only syncs for the *individual user's last session* and not across multiple users
        // For true "live TV channel" sync, you NEED a backend server.

        const CHANNEL_STATE_KEY = 'liveTvChannelState';

        function saveChannelState() {
            const state = {
                lastPlayedIndex: currentVideoIndex,
                lastPlayedTime: player.currentTime(),
                timestamp: Date.now() // When this state was saved
            };
            localStorage.setItem(CHANNEL_STATE_KEY, JSON.stringify(state));
            // console.log('Channel state saved:', state); // Uncomment for debugging
        }

        function loadAndResumeChannel() {
            const savedState = localStorage.getItem(CHANNEL_STATE_KEY);
            if (savedState) {
                const state = JSON.parse(savedState);
                console.log('Loaded saved state:', state);

                let calculatedIndex = 0;
                let calculatedSeekTime = 0;
                const timeSinceLastSave = (Date.now() - state.timestamp) / 1000; // in seconds

                // Estimate where the "channel" should be now based on saved state and elapsed time
                // This logic iterates through the playlist to find the correct video and seek time
                let estimatedCurrentChannelTime = state.lastPlayedTime + timeSinceLastSave;
                let foundPoint = false;

                for (let i = state.lastPlayedIndex; i < playlist.length; i++) {
                    const video = playlist[i];
                    if (video.duration === null) {
                        // For live streams (null duration), we assume it's still the same live stream.
                        // The server would normally tell us the exact segment for a live stream.
                        calculatedIndex = i;
                        calculatedSeekTime = 0; // Or whatever the server indicates for a live stream
                        foundPoint = true;
                        break;
                    }
                    if (estimatedCurrentChannelTime < video.duration) {
                        calculatedIndex = i;
                        calculatedSeekTime = estimatedCurrentChannelTime;
                        foundPoint = true;
                        break;
                    }
                    estimatedCurrentChannelTime -= video.duration;
                }

                if (!foundPoint) {
                    // If we've passed all videos from the saved point, loop back to start
                    // and continue calculating from the beginning of the playlist
                    let totalPlaylistDuration = playlist.filter(v => v.duration !== null).reduce((sum, v) => sum + v.duration, 0);
                    if (totalPlaylistDuration > 0) {
                        estimatedCurrentChannelTime = (state.lastPlayedTime + timeSinceLastSave) % totalPlaylistDuration;
                        for (let i = 0; i < playlist.length; i++) {
                            const video = playlist[i];
                            if (video.duration === null) continue; // Skip live streams for duration calculation
                            if (estimatedCurrentChannelTime < video.duration) {
                                calculatedIndex = i;
                                calculatedSeekTime = estimatedCurrentChannelTime;
                                foundPoint = true;
                                break;
                            }
                            estimatedCurrentChannelTime -= video.duration;
                        }
                    } else {
                        // If all videos are live or no durations, just start from index 0
                        calculatedIndex = 0;
                        calculatedSeekTime = 0;
                        foundPoint = true;
                    }
                }

                if (foundPoint) {
                    console.log(`Resuming from estimated video ${calculatedIndex} at ${calculatedSeekTime}s`);
                    playVideo(calculatedIndex, calculatedSeekTime);
                } else {
                    console.warn('Could not determine resume point. Starting from beginning.');
                    playVideo(0);
                }
            } else {
                // No saved state, start from the beginning
                console.log('No saved state found. Starting from the beginning.');
                playVideo(0);
            }
        }

        // Save state before user leaves or refreshes the page
        window.addEventListener('beforeunload', saveChannelState);

        // Initiate fetching the playlist when the page loads
        fetchPlaylist();
    </script>
</body>
</html>
