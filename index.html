<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Live TV Playlist (24h format)</title>
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
      .player-wrapper {
    width: 90%;
    max-width: 1000px;
    aspect-ratio: 16 / 9;
    border: 4px solid gold;
    border-radius: 10px;
    overflow: hidden;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
  </style>
</head>
<body>
<div class="player-wrapper">
  <iframe src="player.html?url=..." allowfullscreen></iframe>
</div>
 <script>
    // Helper to create Date for today at given HH:MM string, local time
    function todayAt(timeStr) {
      const [h, m] = timeStr.split(':').map(Number);
      const d = new Date();
      d.setHours(h, m, 0, 0);
      return d;
    }

    // Playlist with 24h schedule times (today's date is assumed)
    const playlist = [
      {
        url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
        startTime: "10:46",
        endTime: "10:47"
      },
      {
        url: "https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8",
        startTime: "10:47",
        endTime: "10:48"
      }
    ];

    function findCurrentStream(now) {
      for (const item of playlist) {
        const start = todayAt(item.startTime);
        const end = todayAt(item.endTime);
        if (now >= start && now < end) {
          return { url: item.url, offset: (now - start) / 1000 };
        }
      }
      return null;
    }

    function setIframeSrc() {
      const now = new Date();
      const stream = findCurrentStream(now);
      const iframe = document.getElementById("playerIframe");

      if (!stream) {
        iframe.src = ""; // no stream right now
        return;
      }

      const src = `player.html?url=${encodeURIComponent(stream.url)}&offset=${Math.floor(stream.offset)}`;
      iframe.src = src;
    }

    setIframeSrc();
    setInterval(setIframeSrc, 60000);
  </script>

</body>
</html>
