<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MSTV Multi-Channel</title>
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    iframe {
      width: 90%;
      height: 50vh;
      border: 4px solid gold;
      border-radius: 10px;
      background: black;
    }
    #unmute-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 24px;
      background: rgba(0, 0, 0, 0.5);
      border: none;
      color: white;
      cursor: pointer;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div style="position: relative;">
    <button id="unmute-btn">🔇</button>
    <iframe id="player" allow="autoplay" allowfullscreen></iframe>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const ch = params.get("ch") || "1"; // default to channel 1
    const channelsUrl = "https://yourdomain.netlify.app/channels.json"; // UPDATE this with your real hosted JSON

    const player = document.getElementById("player");
    const unmuteBtn = document.getElementById("unmute-btn");
    let isMuted = true;

    unmuteBtn.addEventListener("click", () => {
      isMuted = !isMuted;
      player.contentWindow.postMessage({ type: 'volume', muted: isMuted }, "*");
      unmuteBtn.textContent = isMuted ? "🔇" : "🔊";
    });

    function getCurrentSegment(schedule) {
      const now = new Date();
      const currentMinutes = now.getHours() * 60 + now.getMinutes();

      for (const segment of schedule) {
        const [startH, startM] = segment.startTime.split(":").map(Number);
        const [endH, endM] = segment.endTime.split(":").map(Number);
        const start = startH * 60 + startM;
        const end = endH * 60 + endM;

        if (currentMinutes >= start && currentMinutes < end) {
          return segment.url;
        }
      }

      return null;
    }

    fetch(channelsUrl)
      .then(res => res.json())
      .then(data => {
        const playlist = data[ch];
        if (!playlist) {
          alert("Channel not found.");
          return;
        }

        const currentUrl = getCurrentSegment(playlist);
        if (currentUrl) {
          player.src = currentUrl;
        } else {
          player.src = "about:blank";
        }
      });
  </script>
</body>
</html>
