<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Embed Player</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      background: black;
      overflow: hidden;
    }
    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      background: #000;
    }
    #overlay {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: sans-serif;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div id="overlay">Loading...</div>
  <video id="player" autoplay playsinline></video>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    async function getChannelData() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");

      const res = await fetch("channels.json"); // use full URL if needed
      const data = await res.json();

      if (!data[id]) {
        document.getElementById('overlay').textContent = "Channel not found.";
        return;
      }

      const { title, url, type } = data[id];
      const video = document.getElementById("player");
      const overlay = document.getElementById("overlay");

      overlay.textContent = title;

      if (type === "m3u8") {
        if (Hls.isSupported()) {
          const hls = new Hls();
          hls.loadSource(url);
          hls.attachMedia(video);
        } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
          video.src = url;
        } else {
          overlay.textContent = "HLS not supported.";
        }
      } else if (type === "mp4") {
        video.src = url;
      }

      // Try to unmute after load
      video.muted = false;
      video.play().catch(() => {
        overlay.textContent += " (click to play)";
        video.addEventListener("click", () => video.play());
      });
    }

    getChannelData();
  </script>
</body>
</html>
