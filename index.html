<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Live TV Playlist (24h format)</title>
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <iframe id="playerIframe" src="" allowfullscreen allow="autoplay"></iframe>

  <script>
    // Helper to create Date for today at given HH:MM string, local time
    function todayAt(timeStr) {
      const [h, m] = timeStr.split(':').map(Number);
      const d = new Date();
      d.setHours(h, m, 0, 0);
      return d;
    }

    // Playlist with 24h schedule times (today's date is assumed)
    // IMPORTANT: Ensure no gaps or overlaps for continuous playback.
    // Ensure the playlist covers the full 24 hours if intended to be a continuous "channel".
    const playlist = [
      {
        url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
        startTime: "13:21", // Example: Adjusted to ensure enough playback time
        endTime: "13:22"    // Example: This video plays for 5 minutes
      },
      {
        url: "https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8",
        startTime: "13:22", // Starts exactly when the previous one ends
        endTime: "13:23"    // Plays for 5 minutes
      },
      {
        url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", // Using the same URL for demonstration
        startTime: "13:23",
        endTime: "13:24"
      },
      {
        url: "https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8", // Using the same URL for demonstration
        startTime: "13:24",
        endTime: "13:25"
      }
      // Add more videos here. Make sure end time of one is start time of next.
    ];

    let currentStreamUrl = null; // Track currently playing stream URL to avoid unnecessary reloads
    let currentIntervalId = null; // To clear the previous interval/timeout

    function findCurrentStream(now) {
      for (const item of playlist) {
        const start = todayAt(item.startTime);
        const end = todayAt(item.endTime);

        if (now >= start && now < end) {
          return { url: item.url, offset: (now - start) / 1000, endTime: end };
        }
      }
      return null;
    }

    function scheduleNextStreamCheck(endTime) {
        if (currentIntervalId) {
            clearTimeout(currentIntervalId); // Clear any previous scheduled check
        }

        const now = new Date();
        const timeUntilNext = endTime.getTime() - now.getTime();

        if (timeUntilNext > 0) {
            // Schedule check slightly after the current stream's end time
            // Add a small buffer (e.g., 500ms) to ensure we're past the end
            currentIntervalId = setTimeout(setIframeSrc, timeUntilNext + 500);
            console.log(`Next stream check scheduled in ${timeUntilNext + 500}ms.`);
        } else {
            // If somehow we've missed the transition, check immediately
            console.log("Current stream has already ended or time is negative, checking immediately.");
            setIframeSrc();
        }
    }

    function setIframeSrc() {
      const now = new Date();
      const stream = findCurrentStream(now);
      const iframe = document.getElementById("playerIframe");

      if (!stream) {
        console.log("No stream scheduled for the current time.");
        iframe.src = ""; // Or a placeholder HTML page
        currentStreamUrl = null; // Reset
        if (currentIntervalId) {
            clearTimeout(currentIntervalId); // Clear any pending timeout
        }
        // If no stream, maybe schedule a periodic check until one becomes available
        currentIntervalId = setTimeout(setIframeSrc, 30000); // Check every 30 seconds if no stream
        return;
      }

      // Get the persistent mute state from localStorage (or default to true/muted)
      // Default to 'true' (muted) if not found in localStorage, which is safer for autoplay.
      const isMuted = localStorage.getItem('playerMutedState') === 'true';

      const newSrc = `player.html?url=${encodeURIComponent(stream.url)}&offset=${Math.floor(stream.offset)}&muted=${isMuted}`;

      // Only update iframe src if the URL or mute state has changed to prevent unnecessary reloads
      // We explicitly check for URL change here, and the muted state is always passed.
      if (currentStreamUrl !== stream.url || iframe.src !== window.location.origin + newSrc) {
         console.log(`Loading new stream: ${stream.url} with offset ${Math.floor(stream.offset)} and muted=${isMuted}`);
         iframe.src = newSrc;
         currentStreamUrl = stream.url; // Update tracking
      } else {
         console.log(`Stream ${stream.url} is still current, no change.`);
      }

      // Schedule the next check based on the current stream's end time
      scheduleNextStreamCheck(stream.endTime);
    }

    // Initial call
    setIframeSrc();

    // Add a listener to ensure that if player.html sends a message about its mute state,
    // we can update localStorage accordingly. This is a fallback/extra check.
    window.addEventListener('message', function(event) {
        // Ensure the message is from our iframe and has the correct type
        if (event.origin === window.location.origin && event.data && event.data.type === 'muteStateChange') {
            localStorage.setItem('playerMutedState', event.data.muted);
            console.log("Mute state received from player and updated in localStorage:", event.data.muted);
        }
    });

  </script>

</body>
</html>
