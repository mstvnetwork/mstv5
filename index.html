<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSTV Network</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    #videoContainer {
      position: relative;
      width: 100%;
      max-width: 960px;
      margin: 20px auto;
      border: 4px solid gold;
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      background: #111;
    }
    video {
      width: 100%;
      height: 100%;
      background: black;
    }
    .off-air {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-size: 2em;
      color: red;
      background: black;
    }
  </style>
</head>
<body>

  <h1>MSTV Live Channel</h1>
  <div id="videoContainer">
    <video id="video" controls autoplay muted playsinline></video>
  </div>

  <script>
    const { DateTime } = luxon;

    const urlParams = new URLSearchParams(window.location.search);
    const channel = urlParams.get("ch") || "1";

    const schedule = {
      "1": [
        { startTime: "09:03", endTime: "09:04", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
        { startTime: "09:04", endTime: "09:05", url: "https://moiptvhls-i.akamaihd.net/hls/live/652316/secure/demo.m3u8" }
      ],
      "2": [
        { startTime: "08:56", endTime: "08:58", url: "https://moiptvhls-i.akamaihd.net/hls/live/652316/secure/demo.m3u8" }
      ]
    };

    const now = DateTime.now().setZone("Australia/Melbourne");
    const currentTimeStr = now.toFormat("HH:mm");
    const currentSchedule = schedule[channel];

    let currentItem = null;

    if (currentSchedule) {
      currentItem = currentSchedule.find(item => {
        return currentTimeStr >= item.startTime && currentTimeStr < item.endTime;
      });
    }

    const container = document.getElementById("videoContainer");
    const video = document.getElementById("video");

    if (currentItem) {
      const hlsSupported = Hls.isSupported();
      const source = currentItem.url;
      const startDateTime = DateTime.fromFormat(currentItem.startTime, "HH:mm", { zone: "Australia/Melbourne" });
      const elapsed = Math.max(0, (now - startDateTime) / 1000);

      if (hlsSupported) {
        const hls = new Hls();
        hls.loadSource(source);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          video.currentTime = elapsed;
          video.play();
        });
      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = source;
        video.addEventListener("loadedmetadata", () => {
          video.currentTime = elapsed;
          video.play();
        });
      } else {
        container.innerHTML = "<div class='off-air'>HLS Not Supported</div>";
      }

      // Auto-reload at endTime to load next video
      const endDateTime = DateTime.fromFormat(currentItem.endTime, "HH:mm", { zone: "Australia/Melbourne" });
      const msToEnd = endDateTime.diff(now).as("milliseconds");
      setTimeout(() => location.reload(), msToEnd);

    } else {
      container.innerHTML = "<div class='off-air'>Currently Off Air</div>";
    }
  </script>

</body>
</html>
