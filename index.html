<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Live TV Channels</title>
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: sans-serif;
      color: white;
      text-align: center;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 0;
      display: block;
    }
    .message-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-size: 1.5em;
        z-index: 15;
    }
    .message-overlay p {
        margin: 10px 0;
    }
  </style>
</head>
<body>

  <iframe id="playerIframe" src="" allowfullscreen></iframe>
  <div id="messageOverlay" class="message-overlay" style="display: none;">
      <p id="messageText"></p>
  </div>

  <script>
    // Helper to create Date for today at given HH:MM string, local time
    function todayAt(timeStr) {
      const [h, m] = timeStr.split(':').map(Number);
      const d = new Date();
      d.setHours(h, m, 0, 0);
      return d;
    }

    // Define playlists for multiple channels, starting from 16:32 AEST
    const channelPlaylists = {
      '1': [ // Playlist for Channel 1
        {
          url: "http://sample.vodobox.net/skate_phantom_flex_4k/skate_phantom_flex_4k.m3u8",
          startTime: "16:32", // Starts at 4:32 PM AEST
          endTime: "16:34"    // Plays for 2 minutes
        },
        {
          url: "https://playertest.longtailvideo.com/adaptive/wowzaid3/playlist.m3u8",
          startTime: "16:34", // Starts immediately after previous
          endTime: "16:36"
        },
        {
          url: "https://content.jwplatform.com/manifests/vM7nH0Kl.m3u8",
          startTime: "16:36",
          endTime: "16:38"
        },
        {
          url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
          startTime: "16:38",
          endTime: "23:59" // Plays until end of day
        }
      ],
      '2': [ // Playlist for Channel 2 - Different schedule using the same URLs
        {
          url: "https://playertest.longtailvideo.com/adaptive/wowzaid3/playlist.m3u8",
          startTime: "16:32",
          endTime: "16:35"
        },
        {
          url: "http://sample.vodobox.net/skate_phantom_flex_4k/skate_phantom_flex_4k.m3u8",
          startTime: "16:35",
          endTime: "16:38"
        },
        {
          url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
          startTime: "16:38",
          endTime: "16:41"
        },
        {
          url: "https://content.jwplatform.com/manifests/vM7nH0Kl.m3u8",
          startTime: "16:41",
          endTime: "23:59"
        }
      ],
      '3': [ // Playlist for Channel 3 - Another variation
        {
          url: "https://content.jwplatform.com/manifests/vM7nH0Kl.m3u8",
          startTime: "16:32",
          endTime: "16:33"
        },
        {
          url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
          startTime: "16:33",
          endTime: "16:35"
        },
        {
          url: "http://sample.vodobox.net/skate_phantom_flex_4k/skate_phantom_flex_4k.m3u8",
          startTime: "16:35",
          endTime: "16:37"
        },
        {
          url: "https://playertest.longtailvideo.com/adaptive/wowzaid3/playlist.m3u8",
          startTime: "16:37",
          endTime: "23:59"
        }
      ]
    };

    // This function now correctly accepts 'playlist' as an argument
    function findCurrentStream(now, playlist) {
      for (const item of playlist) {
        const start = todayAt(item.startTime);
        const end = todayAt(item.endTime);
        if (now >= start && now < end) {
          return { url: item.url, offset: (now - start) / 1000 };
        }
      }
      return null;
    }

    function showMessage(text) {
        const overlay = document.getElementById("messageOverlay");
        const messageText = document.getElementById("messageText");
        messageText.textContent = text;
        overlay.style.display = 'flex';
        document.getElementById("playerIframe").style.display = 'none'; // Hide iframe when message is shown
    }

    function hideMessage() {
        document.getElementById("messageOverlay").style.display = 'none';
        document.getElementById("playerIframe").style.display = 'block'; // Show iframe when message is hidden
    }

    function setIframeSrc() {
      const now = new Date();
      const iframe = document.getElementById("playerIframe");
      const urlParams = new URLSearchParams(window.location.search);
      const channelId = urlParams.get('ch') || '1'; // Default to channel '1' if no 'ch' parameter

      const activePlaylist = channelPlaylists[channelId];

      if (!activePlaylist) {
        showMessage(`Channel "${channelId}" not found. Please check the URL.`);
        iframe.src = ""; // Clear iframe if channel is invalid
        console.error(`Error: Channel "${channelId}" not found.`);
        return;
      }

      // This is where 'activePlaylist' is correctly passed to findCurrentStream
      const stream = findCurrentStream(now, activePlaylist);

      if (!stream) {
        iframe.src = ""; // no stream right now
        showMessage(`Channel ${channelId} is currently off air. Please check back later.`);
        console.log(`No stream scheduled for Channel ${channelId} at the current time.`);
        return;
      }

      const src = `player.html?url=${encodeURIComponent(stream.url)}&offset=${Math.floor(stream.offset)}`;

      // Only update iframe source if it's actually changing, to prevent unnecessary reloads
      if (iframe.src !== src) {
        iframe.src = src;
        console.log("Iframe source updated to:", src);
        hideMessage(); // Hide any active messages once a stream is found and set
      } else {
        // console.log("Iframe source is already correct:", src); // Uncomment for debugging
      }
    }

    // Initial call to set the correct stream when the page loads
    setIframeSrc();

    // For testing short intervals, set to 5000 (5 seconds) or 1000 (1 second).
    // REMEMBER TO CHANGE IT BACK TO 60000 (1 minute) FOR PRODUCTION!
    setInterval(setIframeSrc, 5000);
  </script>

</body>
</html>
