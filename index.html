<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSTV Live Channel</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: sans-serif;
      text-align: center;
    }
    video {
      width: 100%;
      max-width: 800px;
      height: auto;
      background: #000;
      outline: none;
    }
    #offAir {
      color: red;
      font-size: 1.5rem;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>MSTV Network</h1>
  <video id="videoPlayer" controls autoplay muted playsinline></video>
  <div id="offAir" style="display: none;">Currently Off Air</div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const video = document.getElementById('videoPlayer');
    const offAir = document.getElementById('offAir');
    const urlParams = new URLSearchParams(window.location.search);
    const channelId = urlParams.get('ch') || "1";

    // HARD-CODED MULTICHANNEL SCHEDULE
    const channelData = {
      "1": [
        { startTime: "08:10", endTime: "08:11", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
        { startTime: "08:11", endTime: "08:12", url: "https://moiptvhls-i.akamaihd.net/hls/live/652316/secure/demo.m3u8" }
      ],
      "2": [
        { startTime: "08:20", endTime: "08:21", url: "http://playertest.longtailvideo.com/adaptive/wowzaid3/playlist.m3u8" }
      ],
      "3": [
        { startTime: "08:12", endTime: "08:48", url: "https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8" }
      ]
    };

    function getCurrentTimeInMinutes() {
      const now = new Date();
      return now.getHours() * 60 + now.getMinutes();
    }

    function parseTimeToMinutes(timeStr) {
      const [h, m] = timeStr.split(":").map(Number);
      return h * 60 + m;
    }

    function getCurrentItem(schedule) {
      const currentMinutes = getCurrentTimeInMinutes();
      for (let i = 0; i < schedule.length; i++) {
        const start = parseTimeToMinutes(schedule[i].startTime);
        const end = parseTimeToMinutes(schedule[i].endTime);
        if (currentMinutes >= start && currentMinutes < end) {
          return {
            ...schedule[i],
            offsetSeconds: (currentMinutes - start) * 60 + new Date().getSeconds(),
            endInSeconds: (end - currentMinutes) * 60 - new Date().getSeconds()
          };
        }
      }
      return null;
    }

    function playHLS(url, offsetSeconds, endInSeconds) {
      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          video.currentTime = offsetSeconds;
          video.play();
        });

        setTimeout(() => {
          video.pause();
          offAir.style.display = "block";
        }, endInSeconds * 1000);
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.currentTime = offsetSeconds;
        video.play();

        setTimeout(() => {
          video.pause();
          offAir.style.display = "block";
        }, endInSeconds * 1000);
      }
    }

    function startPlayback() {
      const schedule = channelData[channelId];
      if (!schedule) {
        offAir.innerText = "Channel Not Found";
        offAir.style.display = "block";
        return;
      }

      const currentItem = getCurrentItem(schedule);

      if (currentItem) {
        offAir.style.display = "none";
        playHLS(currentItem.url, currentItem.offsetSeconds, currentItem.endInSeconds);
      } else {
        offAir.innerText = "Currently Off Air";
        offAir.style.display = "block";
        video.pause();
        video.removeAttribute("src");
      }
    }

    startPlayback();
    setInterval(startPlayback, 60000); // Check every 1 minute for new slot
  </script>
</body>
</html>
