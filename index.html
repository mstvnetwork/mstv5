<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MSTV NETWORK</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 20px;
      font-size: 2em;
      color: gold;
      text-shadow: 1px 1px 5px red;
    }

    .player-wrapper {
      width: 90%;
      max-width: 1000px;
      aspect-ratio: 16 / 9;
      border: 4px solid gold;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .footer {
      margin-top: 30px;
      font-size: 0.9em;
      color: #ccc;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>MSTV NETWORK</h1>

  <div class="player-wrapper">
    <iframe id="playerIframe" allow="autoplay"></iframe>
  </div>

  <div class="footer">© 2025 MSTV Network. All rights reserved.</div>

  <script>
    // Playlist (example format)
    const playlist = [
      { url: "https://example.com/video1.m3u8", startTime: "00:00", endTime: "02:00" },
      { url: "https://example.com/video2.m3u8", startTime: "02:00", endTime: "04:00" },
      { url: "https://example.com/video3.m3u8", startTime: "04:00", endTime: "06:00" },
      // Add your full 24-hour schedule here
    ];

    function getCurrentTimeHHMM() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2, '0');
      const m = now.getMinutes().toString().padStart(2, '0');
      return `${h}:${m}`;
    }

    function timeToMinutes(timeStr) {
      const [h, m] = timeStr.split(":").map(Number);
      return h * 60 + m;
    }

    function findCurrentVideo() {
      const now = timeToMinutes(getCurrentTimeHHMM());
      for (let item of playlist) {
        const start = timeToMinutes(item.startTime);
        const end = timeToMinutes(item.endTime);
        if (now >= start && now < end) {
          const offsetSeconds = (now - start) * 60;
          return { url: item.url, offset: offsetSeconds };
        }
      }
      return null;
    }

    function loadPlayer() {
      const video = findCurrentVideo();
      if (video) {
        const iframe = document.getElementById("playerIframe");
        iframe.src = `player.html?url=${encodeURIComponent(video.url)}&offset=${video.offset}`;
      } else {
        document.getElementById("playerIframe").outerHTML = "<div style='color:red;'>No video scheduled right now.</div>";
      }
    }

    loadPlayer();
  </script>

</body>
</html>
