<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSTV NETWORK</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/luxon/3.4.3/luxon.min.js"></script>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: sans-serif;
      text-align: center;
      padding: 10px;
    }
    #player-container {
      position: relative;
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      border: 4px solid gold;
      border-radius: 16px;
      overflow: hidden;
    }
    video, iframe {
      width: 100%;
      height: 405px;
      display: none;
    }
    #nowPlaying {
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <h1>MSTV NETWORK</h1>
  <div id="player-container">
    <video id="video" controls autoplay muted></video>
    <iframe id="ytplayer" frameborder="0" allowfullscreen></iframe>
  </div>
  <div id="nowPlaying">Loading schedule...</div>

  <script>
    const video = document.getElementById("video");
    const ytplayer = document.getElementById("ytplayer");
    const nowPlaying = document.getElementById("nowPlaying");

    const params = new URLSearchParams(window.location.search);
    const channel = params.get("ch") || "1";

    const jsonUrl = "https://raw.githubusercontent.com/mstvnetwork/mstv5/main/channels.json";

    fetch('https://raw.githubusercontent.com/mstvnetwork/mstv5/main/channels.json')
      .then(res => res.json())
      .then(schedule => {
        const now = luxon.DateTime.now().setZone("Australia/Melbourne");
        const currentTime = now.toFormat("HH:mm");

        const currentChannel = schedule[channel];
        if (!currentChannel) {
          nowPlaying.textContent = `Channel ${channel} not found.`;
          return;
        }

        const currentItem = currentChannel.find(item =>
          currentTime >= item.startTime && currentTime < item.endTime
        );

        if (!currentItem) {
          nowPlaying.textContent = `Currently Off-Air on Channel ${channel}`;
          return;
        }

        nowPlaying.textContent = `Now Playing: ${currentItem.url}`;

        if (currentItem.url.includes("youtube.com") || currentItem.url.includes("youtu.be")) {
          ytplayer.style.display = "block";
          video.style.display = "none";
          const videoId = extractYouTubeID(currentItem.url);
          ytplayer.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&playsinline=1`;
        } else if (currentItem.url.endsWith(".m3u8")) {
          ytplayer.style.display = "none";
          video.style.display = "block";
          if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(currentItem.url);
            hls.attachMedia(video);
          } else {
            video.src = currentItem.url;
          }
          video.play();
        }
      })
      .catch(err => {
        nowPlaying.textContent = "Error loading schedule.";
        console.error(err);
      });

    function extractYouTubeID(url) {
      const regExp = /^.*(youtu\.be\/|v=)([^#&?]*).*/;
      const match = url.match(regExp);
      return match && match[2].length === 11 ? match[2] : null;
    }
  </script>
</body>
</html>
