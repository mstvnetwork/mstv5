l<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HLS Player</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      overflow: hidden;
    }

    #video {
      width: 100%;
      height: 100%;
      background: black;
    }

    #speakerToggle {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 28px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 50%;
      padding: 8px;
      cursor: pointer;
      user-select: none;
      z-index: 10;
      color: white;
      transition: opacity 0.3s;
    }

    #speakerToggle.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline controls muted></video>
  <div id="speakerToggle">🔇</div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const video = document.getElementById("video");
    const speakerToggle = document.getElementById("speakerToggle");
    const params = new URLSearchParams(window.location.search);
    const url = params.get("url");
    const offset = parseInt(params.get("offset")) || 0;

    // Restore mute state from sessionStorage
    const savedMuteState = sessionStorage.getItem("playerMuted");
    video.muted = savedMuteState === null ? true : savedMuteState === "true";

    function updateSpeakerIcon() {
      speakerToggle.textContent = video.muted ? "🔇" : "🔊";
      speakerToggle.classList.toggle("hidden", !video.muted);
    }

    speakerToggle.addEventListener("click", () => {
      video.muted = !video.muted;
      sessionStorage.setItem("playerMuted", video.muted);
      updateSpeakerIcon();
    });

    function tryPlay() {
      video.play().catch(e => console.warn("Play failed:", e));
    }

    function loadVideoStream(finalURL) {
      if (Hls.isSupported()) {
        const hls = new Hls({ startPosition: -1 });
        hls.loadSource(finalURL);
        hls.attachMedia(video);

        hls.on(Hls.Events.MEDIA_ATTACHED, () => {
          console.log("Media attached to video element");
        });

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          console.log("Manifest parsed, waiting for metadata...");
        });

        hls.on(Hls.Events.LEVEL_LOADED, () => {
          console.log("Level loaded, setting offset if any...");
          if (offset > 0) {
            video.currentTime = offset;
          }
          tryPlay();
        });

        // Clean up on reload (optional but good practice)
        window.addEventListener("beforeunload", () => {
          hls.destroy();
        });

      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = finalURL;
        video.addEventListener("loadedmetadata", () => {
          if (offset > 0) video.currentTime = offset;
          tryPlay();
        });
      } else {
        document.body.innerHTML += "<p style='color:white;'>HLS not supported in this browser.</p>";
      }
    }

    if (!url) {
      document.body.innerHTML += "<p style='color:white;'>No stream URL provided.</p>";
      throw new Error("Missing URL");
    }

    // Trick: Avoid player freeze by appending dummy param to HLS URL
    const finalURL = url + (url.includes("?") ? "&" : "?") + "nocache=" + Math.floor(Math.random() * 1000000);
    loadVideoStream(finalURL);

    updateSpeakerIcon();
  </script>
</body>
</html>
