<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            position: relative; /* For spinner and overlay positioning */
            width: 100vw;
            height: 100vh;
        }
        #videoPlayer {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain; /* Ensures the video fits within the player while maintaining aspect ratio */
            background-color: #000; /* Black background for player area */
        }
        .spinner-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #FFD700; /* Golden Yellow */
            font-family: sans-serif;
            font-size: 1.2em;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .spinner {
            border: 4px solid rgba(255, 215, 0, 0.3); /* Light golden yellow */
            border-top: 4px solid #FFD700; /* Golden yellow */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #clickToPlayOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8em;
            cursor: pointer;
            z-index: 20; /* Ensure it's above the spinner */
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
</head>
<body>
    <video id="videoPlayer" controls autoplay muted playsinline></video>

    <div id="spinnerContainer" class="spinner-container" style="display: none;">
        <div class="spinner"></div>
        <p id="spinnerText">Connecting...</p>
    </div>

    <div id="clickToPlayOverlay" style="display: none;">
        Click to Play
    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        const spinnerContainer = document.getElementById('spinnerContainer');
        const spinnerText = document.getElementById('spinnerText');
        const clickToPlayOverlay = document.getElementById('clickToPlayOverlay');
        let hlsInstance;
        let url; // Declare url globally within the script or pass it

        function showSpinner(message = 'Connecting...') {
            spinnerText.textContent = message;
            spinnerContainer.style.display = 'flex';
        }

        function hideSpinner() {
            spinnerContainer.style.display = 'none';
        }

        function showClickToPlayOverlay() {
            clickToPlayOverlay.style.display = 'flex';
        }

        function hideClickToPlayOverlay() {
            clickToPlayOverlay.style.display = 'none';
        }

        // Function to destroy existing HLS instance cleanly
        function destroyHlsInstance() {
            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null; // Clear the reference
                console.log("HLS instance destroyed.");
            }
        }

        function initializeHls(videoElement, streamUrl) {
            // Destroy any existing HLS instance before creating a new one
            destroyHlsInstance(); 

            url = streamUrl; // Store the URL if needed elsewhere

            if (Hls.isSupported()) {
                hlsInstance = new Hls({
                    // --- Buffer Management for Smoother Playback ---
                    // Maximum video buffer in seconds. Increase for smoother playback over network hiccups,
                    // but uses more memory. Default is 30.
                    maxBufferLength: 60, 
                    // Maximum buffer that hls.js will ever try to build. Should be greater than maxBufferLength.
                    maxMaxBufferLength: 120, 
                    // Max buffer 'hole' in seconds. Smaller value might cause more seeks but potentially smoother transitions.
                    maxBufferHole: 0.1, // Default 0.5. Try making it smaller.

                    // --- Live Stream Specific (might help even with VODs if treated like live) ---
                    // Number of segments to keep in buffer before live edge. Higher for more stable live.
                    liveSyncDurationCount: 3, 
                    // Max amount of buffer behind live edge before player tries to seek to live.
                    liveMaxLatencyDuration: 10, // Default Infinity. Keep this reasonable for live.

                    // --- Error Handling & Recovery ---
                    // How many times to retry loading a fragment on failure.
                    fragLoadingMaxRetry: 6,
                    // Delay between fragment loading retries.
                    fragLoadingRetryDelay: 1000, // 1 second
                    // Maximum total timeout for fragment loading.
                    fragLoadingMaxRetryTimeout: 60000, // 1 minute

                    // Use Web Worker for parsing (usually good for performance)
                    enableWorker: true,

                    // Enable HTML5 video network stats (useful for debugging, can be left true)
                    debug: false // Set to true for detailed HLS.js console logs during development
                });

                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(videoElement);

                hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                    console.log("HLS: Manifest parsed, attempting to play.");
                    videoElement.play().catch(error => {
                        console.warn("Autoplay was prevented.", error);
                        showClickToPlayOverlay();
                        hideSpinner(); // Hide spinner if autoplay fails
                    });
                    hideSpinner(); // Hide spinner once manifest is parsed
                    hideClickToPlayOverlay(); // Ensure overlay is hidden if autoplay works
                });

                hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                    console.error("HLS Error:", data.type, data.details, data);
                    if (data.fatal) {
                        switch(data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                console.error("HLS Network Error, attempting to recover...");
                                showSpinner("Network Error. Retrying...");
                                hlsInstance.startLoad(); // Try to restart loading
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                console.error("HLS Media Error, attempting to recover...");
                                showSpinner("Media Error. Retrying...");
                                hlsInstance.recoverMediaError(); // Try to recover from media errors
                                break;
                            default:
                                console.error("HLS Fatal Error, destroying instance.");
                                destroyHlsInstance(); // Cannot recover, destroy and show message
                                showSpinner("Stream Error. Please wait.");
                                // Could add logic here to re-initialize after a delay
                                break;
                        }
                    } else {
                        // Non-fatal errors, like BUFFER_FULL_ERROR, often don't need explicit action
                        if (data.details === Hls.ErrorDetails.BUFFER_FULL_ERROR) {
                            console.warn("HLS Non-fatal: Buffer is full. Player might be paused or data coming in too fast.");
                        }
                    }
                });

                hlsInstance.on(Hls.Events.BUFFER_APPENDED, function() {
                    // console.log("HLS: Buffer appended."); // Too chatty for console
                    hideSpinner(); // Hide spinner if data is actively being appended
                });
                hlsInstance.on(Hls.Events.BUFFER_STALLED, function() {
                    console.log("HLS: Buffer stalled. Showing spinner.");
                    showSpinner("Buffering...");
                });
                hlsInstance.on(Hls.Events.BUFFER_FLUSHED, function() {
                    console.log("HLS: Buffer flushed.");
                });
                hlsInstance.on(Hls.Events.LEVEL_SWITCHED, function() {
                    console.log("HLS: Quality level switched.");
                });
                hlsInstance.on(Hls.Events.FRAG_CHANGED, function() {
                    // console.log("HLS: Fragment changed."); // Too chatty
                });

            } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                // Native HLS support for Safari / iOS
                videoElement.src = url;
                videoElement.addEventListener('loadedmetadata', function() {
                    console.log("Native HLS: Metadata loaded, attempting to play.");
                    videoElement.play().catch(error => {
                        console.warn("Native HLS Autoplay prevented.", error);
                        showClickToPlayOverlay();
                        hideSpinner();
                    });
                    hideSpinner();
                    hideClickToPlayOverlay();
                });
                videoElement.addEventListener('error', function() {
                    console.error("Native HLS Error:", videoElement.error);
                    showSpinner("Stream Error. Please wait.");
                });
            } else {
                showSpinner("Your browser does not support HLS playback.");
                console.error("HLS.js is not supported, and native HLS is not available.");
            }
        }

        // Get URL and offset from parent's query string
        const urlParams = new URLSearchParams(window.location.search);
        const streamUrl = urlParams.get('url');
        const offset = parseFloat(urlParams.get('offset')) || 0;

        if (streamUrl) {
            showSpinner(); // Show spinner immediately when player.html loads
            initializeHls(video, streamUrl);

            // Optional: Seek to offset if stream starts from beginning or if it's a VOD
            // For live streams, starting from the beginning is often desired.
            if (offset > 0) {
                video.addEventListener('loadedmetadata', () => {
                    if (video.duration && offset < video.duration) {
                        video.currentTime = offset;
                        console.log(`Seeking to offset: ${offset} seconds.`);
                    }
                }, { once: true }); // Ensure this runs only once per load
            }

            clickToPlayOverlay.addEventListener('click', () => {
                video.play().then(() => {
                    hideClickToPlayOverlay();
                    hideSpinner(); // Hide spinner once successfully played
                }).catch(error => {
                    console.error("Error playing video after click:", error);
                    showSpinner("Could not play video.");
                });
            });

            // Listen for 'playing' event to hide spinner definitively
            video.addEventListener('playing', () => {
                hideSpinner();
                hideClickToPlayOverlay();
                console.log("Video is playing.");
            });

            // Listen for 'waiting' event to show spinner
            video.addEventListener('waiting', () => {
                showSpinner("Buffering...");
                console.log("Video is waiting/buffering.");
            });

            // Listen for 'ended' event (for VODs, might not happen for true live streams)
            video.addEventListener('ended', () => {
                console.log("Video ended.");
                showSpinner("Stream Ended.");
                destroyHlsInstance();
            });

            // Listen for 'error' event on the video element itself
            video.addEventListener('error', (event) => {
                console.error("Video element error:", event.target.error.message, event.target.error.code);
                // More detailed error handling for HTMLMediaElement errors
                if (event.target.error.code === 4) { // MEDIA_ERR_SRC_NOT_SUPPORTED
                    showSpinner("Stream format not supported or invalid URL.");
                } else {
                    showSpinner("Video playback error.");
                }
                destroyHlsInstance();
            });

        } else {
            showSpinner("No stream URL provided.");
            console.error("No 'url' parameter found in query string.");
        }
    </script>
</body>
</html>
