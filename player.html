<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HLS Player</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      overflow: hidden;
    }

    #video {
      width: 100%;
      height: 100%;
      background: black;
    }

    #speakerToggle {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 28px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 50%;
      padding: 8px;
      cursor: pointer;
      user-select: none;
      z-index: 10;
      color: white;
      transition: opacity 0.3s;
    }

    #speakerToggle.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <video id="video" autoplay muted playsinline></video>

  <!-- Emoji Speaker Button -->
  <div id="speakerToggle">🔇</div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const video = document.getElementById("video");
    const speakerToggle = document.getElementById("speakerToggle");

    const params = new URLSearchParams(window.location.search);
    const url = params.get("url");
    const offset = parseInt(params.get("offset")) || 0;

    // Handle toggle
    function updateSpeakerIcon() {
      speakerToggle.textContent = video.muted ? "🔇" : "🔊";
      speakerToggle.classList.toggle("hidden", !video.muted);
    }

    speakerToggle.addEventListener("click", () => {
      video.muted = !video.muted;
      updateSpeakerIcon();
    });

    // HLS playback
    function playVideoWithOffset() {
      video.currentTime = offset;
      video.play().catch(err => console.warn("Autoplay blocked:", err));
    }

    if (!url) {
      document.body.innerHTML += "<p style='color:white;'>No stream URL provided.</p>";
      throw new Error("Missing URL");
    }

    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, playVideoWithOffset);
    } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
      video.src = url;
      video.addEventListener("loadedmetadata", playVideoWithOffset);
    } else {
      document.body.innerHTML += "<p style='color:white;'>HLS not supported in this browser.</p>";
    }

    // Initial icon state
    updateSpeakerIcon();
  </script>
</body>
</html>
