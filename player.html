<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MSTV Player</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #player-container {
      position: relative;
      width: 90%;
      max-width: 960px;
      aspect-ratio: 16 / 9;
      border: 4px solid gold;
      border-radius: 16px;
      overflow: hidden;
      background: #000;
    }

    video, iframe {
      width: 100%;
      height: 100%;
    }

    #muteToggle {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 24px;
      color: white;
      background: rgba(0, 0, 0, 0.6);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      z-index: 10;
    }
  </style>
</head>
<body>

<div id="player-container">
  <button id="muteToggle">🔇</button>
  <video id="video" controls muted autoplay playsinline style="display: none;"></video>
  <iframe id="iframe" style="display: none;" allowfullscreen allow="autoplay"></iframe>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
  const params = new URLSearchParams(location.search);
  const ch = params.get("ch") || "1";
  const jsonUrl = "https://raw.githubusercontent.com/mstvnetwork/mstv5/main/channels.json";
  const video = document.getElementById("video");
  const iframe = document.getElementById("iframe");
  const muteBtn = document.getElementById("muteToggle");
  let isMuted = true;

  muteBtn.addEventListener("click", () => {
    isMuted = !isMuted;
    video.muted = isMuted;
    muteBtn.textContent = isMuted ? "🔇" : "🔊";
  });

  function getCurrentUrl(schedule) {
    const now = new Date();
    const mins = now.getHours() * 60 + now.getMinutes();

    for (const item of schedule) {
      const [sh, sm] = item.startTime.split(":").map(Number);
      const [eh, em] = item.endTime.split(":").map(Number);
      const start = sh * 60 + sm;
      const end = eh * 60 + em;

      if (mins >= start && mins < end) return item.url;
    }
    return null;
  }

  fetch(jsonUrl)
    .then(res => {
      if (!res.ok) throw new Error(`HTTP error! Status: ${res.status}`);
      return res.json();
    })
    .then(data => {
      console.log("Channels JSON loaded:", data);
      const schedule = data[ch];
      if (!schedule) {
        alert("Channel not found.");
        console.error("Channel playlist missing for:", ch);
        return;
      }

      const streamUrl = getCurrentUrl(schedule);
      if (!streamUrl) {
        alert("Off Air");
        console.log("No matching segment for current time.");
        return;
      }

      if (streamUrl.endsWith(".m3u8")) {
        iframe.style.display = "none";
        video.style.display = "block";

        if (Hls.isSupported()) {
          const hls = new Hls();
          hls.loadSource(streamUrl);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play();
          });
        } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
          video.src = streamUrl;
          video.play();
        }
      } else {
        video.style.display = "none";
        iframe.style.display = "block";
        iframe.src = streamUrl;
      }
    })
    .catch(err => {
      alert("Failed to load channels.json");
      console.error("Fetch error:", err);
    });
</script>
</body>
</html>
