<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-M" />
  <title>HLS Player</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      overflow: hidden;
      position: relative;
    }

    #video {
      width: 100%;
      height: 100%;
      background: black;
      object-fit: contain;
      display: block;
    }

    #speakerToggle {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 28px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 50%;
      padding: 8px;
      cursor: pointer;
      user-select: none;
      z-index: 10;
      color: white;
      transition: opacity 0.3s;
    }

    #playOverlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 2em;
      cursor: pointer;
      z-index: 11;
      flex-direction: column;
      text-align: center;
      opacity: 1;
      transition: opacity 0.3s;
    }

    #playOverlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #playOverlay .play-icon {
        font-size: 3em;
        margin-bottom: 10px;
    }

    #errorMessage {
        position: absolute;
        bottom: 12px;
        left: 12px;
        background: rgba(255, 0, 0, 0.8);
        color: white;
        padding: 8px 15px;
        border-radius: 5px;
        z-index: 12;
        font-size: 0.9em;
        display: none;
    }
  </style>
</head>
<body>
  <video id="video" playsinline muted></video> <div id="speakerToggle"></div>
  <div id="playOverlay" class="hidden">
    <span class="play-icon">▶️</span>
    <span>Click to Play</span>
  </div>
  <div id="errorMessage"></div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const video = document.getElementById("video");
    const speakerToggle = document.getElementById("speakerToggle");
    const playOverlay = document.getElementById("playOverlay");
    const errorMessageDiv = document.getElementById("errorMessage");

    const params = new URLSearchParams(window.location.search);
    const url = params.get("url");
    const offset = parseInt(params.get("offset")) || 0;
    // initialMutedState from URL is the user's preference based on localStorage
    const userPreferredMutedState = params.get("muted") === 'true';

    // The video element starts muted by default for autoplay compliance.
    // We'll then attempt to unmute based on user preference.
    video.muted = true; // Ensure it starts muted for autoplay compliance
    console.log("Player initialized. Video URL:", url, "Offset:", offset, "User Preferred Muted:", userPreferredMutedState);

    let hlsInstance = null;
    let initialPlayAttemptDone = false; // Flag to track if initial play has been tried

    // --- UI Update Functions ---
    function updateSpeakerIcon() {
      speakerToggle.textContent = video.muted ? "🔇" : "🔊";
    }

    function showPlayOverlay() {
        playOverlay.classList.remove("hidden");
    }

    function hidePlayOverlay() {
        playOverlay.classList.add("hidden");
    }

    function showErrorMessage(message) {
        errorMessageDiv.textContent = `Error: ${message}`;
        errorMessageDiv.style.display = 'block';
    }

    function hideErrorMessage() {
        errorMessageDiv.style.display = 'none';
        errorMessageDiv.textContent = '';
    }

    // --- Event Handlers ---
    speakerToggle.addEventListener("click", () => {
      video.muted = !video.muted;
      updateSpeakerIcon();
      localStorage.setItem('playerMutedState', video.muted); // Store user's new preference
      window.parent.postMessage({ type: 'muteStateChange', muted: video.muted }, '*');
      console.log("Speaker toggled. Muted:", video.muted);

      // If video was paused or muted and user clicked unmute, try to play
      if (video.paused && !video.muted) { // Only attempt play if it's paused AND becoming unmuted
          attemptVideoPlayWithOffset();
      } else if (!video.paused && video.muted) { // If playing and now muted, don't re-attempt play
          // If video is playing and user explicitly mutes, no need to call play() again.
      } else if (video.paused && video.muted) { // If paused and staying muted (e.g., initial state)
          // No action needed yet, waiting for an unmute click or overlay click
      }
    });

    playOverlay.addEventListener("click", () => {
        console.log("Play overlay clicked. Attempting to play video.");
        // When overlay is clicked, it means user wants to play AND unmute
        video.muted = false;
        localStorage.setItem('playerMutedState', video.muted);
        window.parent.postMessage({ type: 'muteStateChange', muted: video.muted }, '*');
        updateSpeakerIcon();
        attemptVideoPlayWithOffset();
    });


    // --- HLS Playback Logic ---
    function attemptVideoPlayWithOffset() {
        if (!url) {
            console.error("No stream URL provided for playback attempt.");
            document.body.innerHTML += "<p style='color:white;'>No stream URL provided.</p>";
            hidePlayOverlay();
            return;
        }

        // Wait for HAVE_FUTURE_DATA (readyState 3)
        // This gives HLS.js a chance to buffer a few segments.
        if (video.readyState >= 3) {
            console.log(`Video readyState: ${video.readyState}. Setting currentTime to ${offset} and attempting play.`);
            video.currentTime = offset;

            // Immediately set video.muted based on user preference *before* playing
            // This is the core change for persistent unmute on new loads.
            video.muted = userPreferredMutedState;
            updateSpeakerIcon(); // Update icon based on current muted state

            video.play().then(() => {
                console.log("Video playback started successfully.");
                hidePlayOverlay();
                hideErrorMessage();
                // If it successfully plays unmuted, set the localStorage state to unmuted
                localStorage.setItem('playerMutedState', false);
                window.parent.postMessage({ type: 'muteStateChange', muted: false }, '*');
                updateSpeakerIcon();
            }).catch(err => {
                console.warn("Autoplay blocked or play failed:", err.name, err.message);
                // If the play attempt failed (e.g., NotAllowedError)
                if (err.name === "NotAllowedError") {
                    // Force video to be muted to comply with browser policy
                    video.muted = true;
                    updateSpeakerIcon(); // Show muted icon
                    showPlayOverlay(); // Show overlay to prompt user interaction
                    // Log to localStorage that it's muted
                    localStorage.setItem('playerMutedState', true);
                    window.parent.postMessage({ type: 'muteStateChange', muted: true }, '*');
                } else {
                    showErrorMessage(`Playback failed: ${err.message || err.name}.`);
                }
            });
        } else {
            console.log(`Video not ready yet (readyState: ${video.readyState}). Retrying play attempt in 200ms.`);
            setTimeout(attemptVideoPlayWithOffset, 200);
        }
    }


    // --- Initialize HLS ---
    function initializeHlsPlayer() {
        if (hlsInstance) {
            hlsInstance.destroy();
            hlsInstance = null;
            console.log("Destroyed previous HLS instance.");
        }

        if (Hls.isSupported()) {
          hlsInstance = new Hls({
            maxBufferLength: 90, // Increased buffer: Try 90 seconds
            maxBufferHole: 1.5,  // Increased tolerance for gaps: Try 1.5 seconds
            liveSyncDurationCount: 3,
            liveMaxLatencyDuration: 10,
            fragLoadingMaxRetry: 6,
            fragLoadingRetryDelay: 1000,
            enableWorker: true,
            lowLatencyMode: false,
            // Consider increasing segment and manifest load timeouts if network is flaky
            // fragLoadingTimeOut: 20000, // 20 seconds
            // manifestLoadingTimeOut: 10000, // 10 seconds
          });

          console.log("HLS.js supported. Loading source:", url);
          hlsInstance.loadSource(url);
          hlsInstance.attachMedia(video);

          hlsInstance.on(Hls.Events.MANIFEST_PARSED, (event, data) => {
            console.log("HLS: MANIFEST_PARSED. Levels:", data.levels.length);
            // After manifest parsed, immediately try to play.
            // This will respect the initial muted state of the video element.
            // The `attemptVideoPlayWithOffset` will then handle unmuting if preferred.
            if (!initialPlayAttemptDone) {
                attemptVideoPlayWithOffset();
                initialPlayAttemptDone = true;
            }
          });

          hlsInstance.on(Hls.Events.ERROR, function (event, data) {
            console.error("HLS Error:", data.type, data.details, data.fatal, data.reason);
            let errorMessage = `Stream error: ${data.details}`;
            if (data.reason) {
                errorMessage += ` (${data.reason})`;
            }

            if (data.fatal) {
              switch(data.type) {
                case Hls.ErrorTypes.NETWORK_ERROR:
                  console.error("Fatal network error encountered. Trying to re-start HLS load...");
                  showErrorMessage("Network error, attempting to recover...");
                  hlsInstance.startLoad();
                  break;
                case Hls.ErrorTypes.MEDIA_ERROR:
                  console.error("Fatal media error encountered. Trying to recover media...");
                  showErrorMessage("Media error, attempting to recover...");
                  hlsInstance.recoverMediaError();
                  break;
                default:
                  console.error("Unrecoverable HLS error. Destroying HLS instance.");
                  showErrorMessage("Unrecoverable stream error.");
                  hlsInstance.destroy();
                  showPlayOverlay();
                  break;
              }
            } else if (data.details === Hls.ErrorDetails.BUFFER_FULL_ERROR) {
                console.warn("Non-fatal HLS: BUFFER_FULL_ERROR. Player buffer is full.");
            } else if (data.details === Hls.ErrorDetails.FRAG_PARSING_ERROR) {
                console.warn("Non-fatal HLS: FRAG_PARSING_ERROR. Skipping problematic fragment.");
                showErrorMessage("Video data error. May experience brief skips.");
            } else {
                showErrorMessage(errorMessage);
            }
          });
          hlsInstance.on(Hls.Events.BUFFER_FLUSHING, () => console.log("HLS: BUFFER_FLUSHING"));
          hlsInstance.on(Hls.Events.BUFFER_EOS, () => console.log("HLS: BUFFER_EOS (End of Stream)"));
          hlsInstance.on(Hls.Events.BUFFER_FULL, () => console.log("HLS: BUFFER_FULL"));
          hlsInstance.on(Hls.Events.LEVEL_SWITCHED, (event, data) => console.log("HLS: LEVEL_SWITCHED to", data.level));
          hlsInstance.on(Hls.Events.BUFFER_CREATED, (event, data) => console.log("HLS: BUFFER_CREATED", data.bufType));

        } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
          console.log("Native HLS supported. Loading source:", url);
          video.src = url;
          video.addEventListener("loadedmetadata", () => {
            console.log("Video: loadedmetadata.");
            if (!initialPlayAttemptDone) {
                attemptVideoPlayWithOffset();
                initialPlayAttemptDone = true;
            }
          });
          video.addEventListener('error', (e) => {
            console.error("Native video error:", e);
            showErrorMessage(`Native video error: ${e.message || e.name || 'Unknown'}`);
            showPlayOverlay();
          });
        } else {
          document.body.innerHTML += "<p style='color:white;'>HLS not supported in this browser.</p>";
          console.error("HLS not supported in this browser.");
          showErrorMessage("HLS not supported in this browser.");
        }
    }


    if (!url) {
      document.body.innerHTML += "<p style='color:white;'>No stream URL provided.</p>";
      console.error("Missing stream URL!");
      showErrorMessage("No stream URL provided.");
    } else {
        initializeHlsPlayer();
    }

    // --- Video Element Event Listeners ---
    video.addEventListener('playing', () => {
        console.log("Video 'playing' event fired.");
        hidePlayOverlay();
        hideErrorMessage();
        updateSpeakerIcon();
    });

    video.addEventListener('waiting', () => {
        console.log("Video 'waiting' for data...");
        showErrorMessage("Buffering...");
    });
    video.addEventListener('stalled', () => {
        console.log("Video 'stalled' (data not coming fast enough)...");
        showErrorMessage("Stalled, checking connection...");
    });
    video.addEventListener('ended', () => {
        console.log("Video 'ended' (stream finished).");
    });
    video.addEventListener('pause', () => {
        console.log("Video 'paused'.");
    });
    video.addEventListener('loadeddata', () => {
        console.log("Video 'loadeddata' (current frame available).");
    });
    video.addEventListener('loadstart', () => {
        console.log("Video 'loadstart' (loading process initiated).");
    });

    // Initial state setup
    updateSpeakerIcon();
    // Ensure localStorage preference is always consistent with initial video state
    if (localStorage.getItem('playerMutedState') === null) {
      localStorage.setItem('playerMutedState', video.muted);
      console.log("Initial localStorage mute state set to:", video.muted);
    }
  </script>
</body>
</html>
