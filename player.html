<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HLS Player</title>
  <style>
    body, html {
      margin: 0; padding: 0; height: 100%; background: black; display: flex; justify-content: center; align-items: center;
    }
    video {
      width: 100%;
      height: 100%;
      background: black;
    }
  </style>
</head>
<body>
  <video id="video" controls autoplay muted></video>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    // Parse URL parameters
    const params = new URLSearchParams(window.location.search);
    const url = params.get("url");
    const offset = parseInt(params.get("offset")) || 0;

    const video = document.getElementById("video");

    if (!url) {
      video.insertAdjacentHTML("afterend", "<p style='color:white;'>No stream URL provided.</p>");
      throw new Error("No URL");
    }

    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function() {
        // Try to seek to offset seconds after manifest loaded
        video.currentTime = offset;
        video.play();
      });
      hls.on(Hls.Events.ERROR, function(event, data) {
        console.error("HLS.js error:", data);
      });
    } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
      // Native HLS support (Safari)
      video.src = url;
      video.addEventListener("loadedmetadata", () => {
        video.currentTime = offset;
        video.play();
      });
    } else {
      video.insertAdjacentHTML("afterend", "<p style='color:white;'>HLS not supported in this browser.</p>");
    }
  </script>
</body>
</html>
